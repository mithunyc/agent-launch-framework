name: Codex Agent Gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  CODEX_CLI_VERSION: "0.141.0"

jobs:
  static-gates:
    name: Static gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run dependency-free gates
        run: python scripts/run_ci_gates.py --tier static --pack agent-packs/world-class-reviewer

  codex-managed-agent-proof:
    name: Codex managed-agent proof
    runs-on: ubuntu-latest
    needs: static-gates
    timeout-minutes: 120
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require Codex auth
        shell: bash
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is required for Codex behavior, variance, and plugin packaging proof."
            exit 1
          fi

      - name: Install Codex CLI
        shell: bash
        run: |
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}"
          codex --version

      - name: Run full Codex gates
        run: python scripts/run_ci_gates.py --tier full --pack agent-packs/world-class-reviewer --timeout 600 --plugin-timeout 120
